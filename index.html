<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>I see camra</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #0b0b16 0%, #05050a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        h1 { color: #00f2ff; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,242,255,0.3); }
        button {
            background: linear-gradient(135deg, #00f2ff, #7000ff);
            color: white;
            border: none;
            padding: 14px 24px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,242,255,0.4); }
        
        input {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #222;
            background: #0d0d1a;
            color: white;
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
            width: calc(100% - 30px);
            letter-spacing: 4px;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0;
            margin: 0;
        }
        .hidden { display: none !important; }
        
        /* RETOUR MOBILE PLEIN ÉCRAN */
        #mobile-streaming-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 50;
        }
        #local-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* LIGNE DES BOUTONS EN BAS DU TÉLÉPHONE */
        .mobile-ui {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .mobile-ui button { 
            pointer-events: auto; 
            margin: 0;
        }
        /* Style des boutons carrés et compacts */
        .btn-compact {
            width: auto;
            flex: 1;
            padding: 12px 10px;
            font-size: 13px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #00f2ff;
            border-radius: 8px;
            white-space: nowrap;
        }

        /* PLEIN ÉCRAN PC POUR LE FLUX FINAL */
        #full-video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            background: black;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div id="menu" class="container">
        <h1>I see camra</h1>
        <p style="color: #aaa;">Sélectionnez le rôle de cet appareil :</p>
        <button onclick="switchScreen('viewer-screen'); initViewer();">🖥️ Afficher la caméra (PC)</button>
        <button onclick="switchScreen('streamer-screen');">📱 Partager ma caméra (Tél)</button>
    </div>

    <div id="viewer-screen" class="container hidden">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Code de Liaison</h1>
        <div id="code-display" style="font-size: 32px; font-weight: bold; color: #00f2ff; margin: 20px 0; letter-spacing: 2px;">GÉNÉRATION...</div>
        <p style="color: #aaa;">Entrez ce code à 8 chiffres sur votre téléphone.</p>
    </div>

    <div id="streamer-screen" class="container hidden">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Connexion Sécurisée</h1>
        <input type="text" id="code-input" placeholder="00000000" maxlength="8" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <button onclick="sendCode()">Demander la liaison</button>
    </div>

    <div id="mobile-streaming-screen" class="hidden">
        <video id="local-preview" autoplay playsinline muted></video>
        <div class="mobile-ui">
            <p style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-size: 13px;">Pincez l'écran pour zoomer</p>
            <div class="btn-row">
                <button class="btn-compact" onclick="toggleCamera()">🔄 Renverser la caméra</button>
                <button class="btn-compact" onclick="toggleFullScreenMobile()">🔲 Plein écran</button>
                <button class="btn-compact" onclick="goBack()" style="background: rgba(220,53,69,0.7); border-color: #dc3545;">Quitter</button>
            </div>
        </div>
    </div>

    <div id="popup" class="container hidden" style="position: absolute; z-index: 100; background: #111126;">
        <h1>⚠️ Autorisation</h1>
        <p id="popup-text">Un appareil souhaite se connecter.</p>
        <button onclick="respondPermission(true)" style="background: #28a745;">Autoriser l'accès</button>
        <button onclick="respondPermission(false)" style="background: #dc3545;">Refuser</button>
    </div>

    <video id="full-video" class="hidden" autoplay playsinline></video>

    <script>
        const socket = io('https://i-see-cam-ra.onrender.com'); 
        
        let currentCode = "";
        let currentFacingMode = "environment"; 
        let localStream = null;
        let zoomTrack = null;
        let startDist = 0; 
        let baseZoom = 1; 
        let peerConnection = null;
        let targetDeviceID = null;

        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function switchScreen(screenId) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('viewer-screen').classList.add('hidden');
            document.getElementById('streamer-screen').classList.add('hidden');
            document.getElementById('mobile-streaming-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function goBack() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if(peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if(targetDeviceID) {
                socket.emit('rtc-disconnect', { to: targetDeviceID });
            }
            document.getElementById('full-video').classList.add('hidden');
            document.getElementById('full-video').srcObject = null;
            switchScreen('menu');
        }

        // --- Logique PC (Viewer) ---
        function initViewer() {
            document.getElementById('code-display').innerText = "GÉNÉRATION...";
            socket.emit('request-code', "Mon PC");
        }

        socket.on('code-generated', (code) => {
            currentCode = code;
            document.getElementById('code-display').innerText = code;
        });

        socket.on('ask-permission', ({ streamerName, code }) => {
            document.getElementById('popup-text').innerText = `L'appareil "${streamerName}" veut diffuser sa caméra ici. Confirmez-vous ?`;
            document.getElementById('popup').classList.remove('hidden');
        });

        function respondPermission(accepted) {
            document.getElementById('popup').classList.add('hidden');
            socket.emit('permission-response', { code: currentCode, accepted });
        }

        // --- Logique Téléphone (Streamer) ---
        function sendCode() {
            const codeInput = document.getElementById('code-input');
            currentCode = codeInput.value;
            socket.emit('verify-code', { code: currentCode, deviceName: "Mon Smartphone" });
        }

        // Erreur de code : On affiche un message clair et on vide la case
        socket.on('error-message', (msg) => {
            alert("Erreur : " + msg);
            document.getElementById('code-input').value = ""; 
        });

        socket.on('connection-denied', () => { 
            alert("Connexion refusée par le PC."); 
            document.getElementById('code-input').value = "";
        });

        // --- DÉCLENCHEMENT DE LA VIDÉO (WebRTC corrigé) ---
        socket.on('connection-approved', async ({ targetId }) => {
            targetDeviceID = targetId;
            const isPC = !document.getElementById('viewer-screen').classList.contains('hidden');
            
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('rtc-signal', { to: targetDeviceID, candidate: event.candidate });
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    goBack();
                }
            };

            if (isPC) {
                switchScreen('full-video');
                peerConnection.ontrack = (event) => {
                    // Force l'affichage du flux vidéo reçu sur l'ordinateur
                    const pcVideo = document.getElementById('full-video');
                    pcVideo.srcObject = event.streams[0];
                    pcVideo.play().catch(e => console.log("Erreur lecture vidéo PC:", e));
                };
            } else {
                switchScreen('mobile-streaming-screen');
                await startCamera();
                
                // On attache bien le flux local pour qu'il soit envoyé au PC
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('rtc-signal', { to: targetDeviceID, sdp: peerConnection.localDescription });
            }
        });

        socket.on('rtc-signal', async ({ sdp, candidate }) => {
            if (!peerConnection) return;
            if (sdp) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
                if (peerConnection.remoteDescription.type === 'offer') {
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('rtc-signal', { to: targetDeviceID, sdp: peerConnection.localDescription }); 
                }
            } else if (candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.log(e));
            }
        });

        socket.on('rtc-disconnect', () => {
            goBack();
        });

        // --- Gestion Caméra & Moteur de Zoom ---
        async function startCamera() {
            if (localStream) localStream.getTracks().forEach(track => track.stop());

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });

                const videoElement = document.getElementById('local-preview');
                videoElement.srcObject = localStream;

                zoomTrack = localStream.getVideoTracks()[0];
                setupPinchToZoom(videoElement);

            } catch (err) {
                alert("Erreur d'accès à la caméra : " + err.message);
            }
        }

        async function toggleCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            await startCamera();
            if (peerConnection && localStream) {
                const senders = peerConnection.getSenders();
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = senders.find(s => s.track && s.track.kind === 'video');
                if (sender) {
                    sender.replaceTrack(videoTrack);
                }
            }
        }

        // Mode plein écran natif pour le navigateur du téléphone
        function toggleFullScreenMobile() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erreur plein écran: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function setupPinchToZoom(element) {
            element.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2 && zoomTrack) {
                    startDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const settings = zoomTrack.getSettings();
                    baseZoom = settings.zoom || 1; 
                }
            });

            element.addEventListener('touchmove', async (e) => {
                if (e.touches.length === 2 && zoomTrack) {
                    const capabilities = zoomTrack.getCapabilities();
                    if (!capabilities.zoom) return; 

                    const currentDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );

                    const delta = (currentDist - startDist) * 0.01; 
                    let newZoom = baseZoom + delta;

                    newZoom = Math.max(capabilities.zoom.min, Math.min(capabilities.zoom.max, newZoom));

                    try {
                        await zoomTrack.applyConstraints({ advanced: [{ zoom: newZoom }] });
                    } catch (err) {
                        console.log("Erreur application zoom", err);
                    }
                }
            });
        }
    </script>
</body>
</html>
