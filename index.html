<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CamLink Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #0b0b16 0%, #05050a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        h1 { color: #00f2ff; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,242,255,0.3); }
        button {
            background: linear-gradient(135deg, #00f2ff, #7000ff);
            color: white;
            border: none;
            padding: 14px 24px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,242,255,0.4); }
        
        /* Input optimisé : Uniquement des chiffres */
        input {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #222;
            background: #0d0d1a;
            color: white;
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
            width: calc(100% - 30px);
            letter-spacing: 4px;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0;
            margin: 0;
        }
        .back-btn:hover { color: #00f2ff; }
        .hidden { display: none !important; }
        
        #local-preview {
            width: 100%;
            height: 200px;
            background: #000;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 15px;
        }
        #full-video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            background: black;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div id="menu" class="container">
        <h1>CamLink Pro</h1>
        <p style="color: #aaa;">Sélectionnez le rôle de cet appareil :</p>
        <button onclick="switchScreen('viewer-screen'); initViewer();">🖥️ Afficher la caméra (PC)</button>
        <button onclick="switchScreen('streamer-screen');">📱 Partager ma caméra (Tél)</button>
    </div>

    <div id="viewer-screen" class="container hidden">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Code de Liaison</h1>
        <div id="code-display" style="font-size: 32px; font-weight: bold; color: #00f2ff; margin: 20px 0; letter-spacing: 2px;">GÉNÉRATION...</div>
        <p style="color: #aaa;">Entrez ce code à 8 chiffres sur votre téléphone.</p>
    </div>

    <div id="streamer-screen" class="container hidden">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Connexion Sécurisée</h1>
        <input type="text" id="code-input" placeholder="00000000" maxlength="8" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <button onclick="sendCode()">Demander la liaison</button>
    </div>

    <div id="mobile-streaming-screen" class="container hidden">
        <h1>Diffusion en cours</h1>
        <video id="local-preview" autoplay playsinline muted></video>
        <p style="color: #aaa; font-size: 14px;">Pincez l'écran pour zoomer</p>
        <button onclick="toggleCamera()" style="background: #333;">🔄 Changer de caméra</button>
    </div>

    <div id="popup" class="container hidden" style="position: absolute; z-index: 100; background: #111126;">
        <h1>⚠️ Autorisation</h1>
        <p id="popup-text">Un appareil souhaite se connecter.</p>
        <button onclick="respondPermission(true)" style="background: #28a745;">Autoriser l'accès</button>
        <button onclick="respondPermission(false)" style="background: #dc3545;">Refuser</button>
    </div>

    <video id="full-video" class="hidden" autoplay playsinline></video>

    <script>
        // REMPLACE 'localhost' PAR L'IP DE TON PC (ex: 'http://192.168.1.50:3000') POUR TESTER AVEC TON TÉLÉPHONE EN WIFI
        const socket = io('https://i-see-cam-ra.onrender.com'); 
        let currentCode = "";
        let currentFacingMode = "environment"; 
        let localStream = null;
        let zoomTrack = null;
        let startDist = 0; 

        function switchScreen(screenId) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('viewer-screen').classList.add('hidden');
            document.getElementById('streamer-screen').classList.add('hidden');
            document.getElementById('mobile-streaming-screen').classList.add('hidden');
            
            document.getElementById(screenId).classList.remove('hidden');
        }

        function goBack() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            switchScreen('menu');
        }

        // --- Logique PC (Viewer) ---
        function initViewer() {
            // On remet le texte de chargement à chaque ouverture pour éviter de voir l'ancien code
            document.getElementById('code-display').innerText = "GÉNÉRATION...";
            socket.emit('request-code', "Mon PC");
        }

        // Réception et affichage instantané du vrai code à 8 chiffres
        socket.on('code-generated', (code) => {
            currentCode = code;
            document.getElementById('code-display').innerText = code;
        });

        socket.on('ask-permission', ({ streamerName, code }) => {
            document.getElementById('popup-text').innerText = `L'appareil "${streamerName}" veut diffuser sa caméra ici. Confirmez-vous ?`;
            document.getElementById('popup').classList.remove('hidden');
        });

        function respondPermission(accepted) {
            document.getElementById('popup').classList.add('hidden');
            socket.emit('permission-response', { code: currentCode, accepted });
        }

        // --- Logique Téléphone (Streamer) ---
        function sendCode() {
            const code = document.getElementById('code-input').value;
            currentCode = code;
            socket.emit('verify-code', { code, deviceName: "Mon Smartphone" });
        }

        socket.on('connection-approved', async () => {
            if (!document.getElementById('viewer-screen').classList.contains('hidden')) {
                document.getElementById('viewer-screen').classList.add('hidden');
                document.getElementById('full-video').classList.remove('hidden');
            } else {
                switchScreen('mobile-streaming-screen');
                await startCamera();
            }
        });

        socket.on('connection-denied', () => { alert("Connexion refusée ou code expiré."); });
        socket.on('error-message', (msg) => { alert(msg); });

        // --- Gestion Caméra & Zoom ---
        async function startCamera() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });

                const videoElement = document.getElementById('local-preview');
                videoElement.srcObject = localStream;

                zoomTrack = localStream.getVideoTracks()[0];
                setupPinchToZoom(videoElement);

            } catch (err) {
                alert("Erreur d'accès à la caméra : " + err.message);
            }
        }

        async function toggleCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            await startCamera();
        }

        function setupPinchToZoom(element) {
            element.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    startDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                }
            });

            element.addEventListener('touchmove', async (e) => {
                if (e.touches.length === 2 && zoomTrack) {
                    const capabilities = zoomTrack.getCapabilities();
                    if (!capabilities.zoom) return; 

                    const currentDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );

                    const delta = currentDist / startDist;
                    const settings = zoomTrack.getSettings();
                    let newZoom = settings.zoom * delta;

                    newZoom = Math.max(capabilities.zoom.min, Math.min(capabilities.zoom.max, newZoom));

                    try {
                        await zoomTrack.applyConstraints({ advanced: [{ zoom: newZoom }] });
                    } catch (err) {
                        console.log("Le zoom n'a pas pu s'appliquer", err);
                    }
                }
            });
        }
    </script>
</body>
</html>
